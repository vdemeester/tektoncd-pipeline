apiVersion: v1
kind: ConfigMap
metadata:
  name: config-artifact-storage
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/instance: default
    app.kubernetes.io/part-of: tekton-pipelines
data:
  _example: |
    ################################
    #                              #
    #    EXAMPLE CONFIGURATION     #
    #                              #
    ################################

    # oci-repository is the base OCI repository for artifact storage.
    # Artifacts are pushed as OCI images to <oci-repository>/<artifact-name>.
    # Example: "ghcr.io/org/project/artifacts" or "registry:5000/artifacts"
    # oci-repository: ""

    # insecure allows plain HTTP for the OCI registry (for local/dev registries).
    # Default: "false"
    # insecure: "false"
