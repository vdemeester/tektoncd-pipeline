# Configure artifact storage to use the local registry
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-artifact-storage
  namespace: tekton-pipelines
data:
  oci-repository: "registry.local:5555/tekton-artifacts"
  insecure: "true"
---
# Ensure artifacts feature is enabled
apiVersion: v1
kind: ConfigMap
metadata:
  name: feature-flags
  namespace: tekton-pipelines
data:
  enable-artifacts: "true"
